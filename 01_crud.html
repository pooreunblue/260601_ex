<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockAPI</title>
</head>
<body>
    <section>
        <h1>포켓몬 등록</h1>
        <form id="pokeRegister">
            <input name="pokename"/>
            <button>등록</button>
        </form>
    </section>
    <script>
        // DOM
        const form = document.querySelector('#pokeRegister');
        // EVENTLISTENER
        form.addEventListener("submit", formHandler);

        function formHandler(event) {
            const formData = new FormData(event.target);
            event.preventDefault();
            console.log(...formData);
            console.log(formData.get("pokename"))
            
            const apiURL = "https://6a1ce1ec8858a003817c236e.mockapi.io/pokemon";
            const response = fetch(apiURL)
            // .then(console.log); // 응답 객체
            // .then((resp) => resp.text()) // 응답 body에 있는 데이터를 텍스트화
            // .then((text) => console.log(text));
            .then((resp) => resp.json())
            .then((json) => console.log(json));
            console.log(response); // Promise {<pending>}
            console.log("제출");
            
        };
    </script>
</body>
</html>
