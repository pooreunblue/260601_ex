<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockAPI</title>
</head>
<body>
    <section>
        <h1>포켓몬 등록</h1>
        <form id="pokeRegister">
            <input name="pokename"/>
            <button>등록</button>
        </form>
    </section>
    <script>
        // DOM
        const form = document.querySelector('#pokeRegister');
        // EVENTLISTENER
        form.addEventListener("submit", formHandler);

        function formHandler(event) {
            const formData = new FormData(event.target);
            event.preventDefault();
            console.log(...formData);
            console.log(formData.get("pokename"))

            createData(formData.get("pokename"));
            console.log("제출")
        };

        // fetch
        function createData(name) {
        // 스코프 차이로 인해서 매개변수로 전달 받아야함
        const apiURL = "https://6a1ce1ec8858a003817c236e.mockapi.io/pokemon";
        // 1. form data로 할 경우
        // const formData = new FormData();
        // formData.append("name", name);
        // 2. JSON으로 전달
        const payload = {
          name,
        };
        console.log(payload)
        const response = fetch(apiURL, {
          method: "POST", // 데이터 생성
        // payload (페이로드를 body에 담는다)
        // body: formData,
          body: JSON.stringify(payload),
          headers: {
            "Content-Type": "application/json",
          },
        })
          // .then(console.log); // 응답 객체
          //   .then((resp) => resp.text()) // 응답 body에 있는 데이터를 텍스트화
          //   .then((text) => console.log(text));
          .then((resp) => resp.json())
          // console.log 대신에 dom 조작하는 함수가 들어가면?
          .then((json) => console.log(json));
        console.log(response); // Promise {<pending>}
      }
    </script>
</body>
</html>
